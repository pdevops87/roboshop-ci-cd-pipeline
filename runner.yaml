- name: run a docker container
  hosts: localhost
  tasks:
    - name: Install python requests
      ansible.builtin.shell: pip3.9 install requests

    - name: Create a data container
      community.docker.docker_container:
        name: "{{ item }}"
        image: pavanidevops78/kubernetes:runner
        state: started
        recreate: true
        docker_host: unix:///var/run/docker.sock
        env:
          URL: "{{ URL }}"
          TOKEN: "{{ TOKEN }}"
          NAME: "{{ item }}"
      loop:
        - runner1
        - runner2
        - runner3
