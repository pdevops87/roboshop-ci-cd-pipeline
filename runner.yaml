- name: run a docker container
  hosts: localhost
  become: true
  tasks:
    - name: install python requests
      ansible.builtin.pip:
        name:
          - requests
          - docker
        executable: pip3.9

    - name: Create a data container
      community.docker.docker_container:
        name: "{{ item }}"
        image: pavanidevops78/kubernetes:runner
        state: started
        recreate: true
        env:
          URL: "{{ URL }}"
          TOKEN: "{{ TOKEN }}"
          NAME: "{{ item }}"
      loop:
        - runner1
        - runner2
        - runner3